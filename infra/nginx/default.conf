# ElimuSight — Nginx Reverse Proxy
# Routes: /api/v1 -> API backend, / -> Web frontend

upstream api_backend {
    server api:3000;
}

upstream ai_backend {
    server ai-service:8000;
}

server {
    listen 80;
    server_name elimusight.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name elimusight.com;

    # SSL (configure with certbot / Let's Encrypt)
    ssl_certificate /etc/ssl/certs/elimusight.crt;
    ssl_certificate_key /etc/ssl/private/elimusight.key;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API backend
    location /api/v1/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI service
    location /ai/ {
        proxy_pass http://ai_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs
    location /api-docs {
        proxy_pass http://api_backend;
    }

    # Frontend SPA
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
