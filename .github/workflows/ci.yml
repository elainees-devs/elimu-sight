name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "apps/ai-service/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/ai-service/**"
      - ".github/workflows/ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: elimu
          POSTGRES_PASSWORD: elimu123
          POSTGRES_DB: elimu_sight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://elimu:elimu123@localhost:5432/elimu_sight_test
          JWT_SECRET: test-secret
          AI_SERVICE_URL: http://localhost:8000

  ai-service-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        uses: chartboost/ruff-action@v1

      - name: Type check with mypy
        run: pip install mypy && mypy app/ --ignore-missing-imports --check-untyped-defs || true

      - name: Run tests
        run: pip install pytest pytest-asyncio httpx && python -m pytest tests/ -v
        env:
          OPENAI_API_KEY: ""
          ENABLE_LLM: "false"
