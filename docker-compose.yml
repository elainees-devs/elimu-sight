version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://elimu:elimu123@db:5432/elimu_sight
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN:-7d}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=gpt-4o-mini
      - ENABLE_LLM=true
      - ENABLE_ML=true
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - LOG_LEVEL=INFO
      - LOG_JSON=true
      - REDIS_URL=
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=elimu
      - POSTGRES_PASSWORD=elimu123
      - POSTGRES_DB=elimu_sight
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elimu -d elimu_sight"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
